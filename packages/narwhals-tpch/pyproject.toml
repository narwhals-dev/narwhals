[build-system]
requires = ["uv_build>=0.11.0,<0.12.0"]
build-backend = "uv_build"

[project]
name = "narwhals-tpch"
version = "0.1.0"
requires-python = ">=3.10"
# Runtime deps of the harness itself: data generation (duckdb) and answer comparison (polars).
dependencies = ["narwhals[duckdb,polars]"]

[tool.uv.sources]
narwhals = { workspace = true }
