[build-system]
requires = ["uv_build>=0.11.0,<0.12.0"]
build-backend = "uv_build"

[project]
name = "test_plugin"
version = "0.1.0"
requires-python = ">=3.10"
dependencies = []

# This is an internal workspace-only package; it must never reach PyPI.
# PyPI rejects any upload whose metadata carries a `Private ::` classifier,
# so this is a hard, tooling-independent guard against accidental publishing.
# See https://pypi.org/classifiers/
classifiers = ["Private :: Do Not Upload"]

[project.entry-points.'narwhals.plugins']
test-plugin = 'test_plugin'
