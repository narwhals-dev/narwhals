[build-system]
requires = ["uv_build>=0.11.0,<0.12.0"]
build-backend = "uv_build"

[project]
name = "narwhals-dict"
version = "0.1.0"
requires-python = ">=3.10"
dependencies = ["narwhals>=2.10.0"]

[project.entry-points.'narwhals.plugins']
narwhals-dict = 'narwhals_dict'

[tool.uv.sources]
narwhals = { workspace = true }
