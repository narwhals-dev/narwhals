name: Type checking

on:
  pull_request:
    paths:
      - "**.py"
      - .github/workflows/typing.yml
      - pyproject.toml
      - uv.lock
  workflow_call:

env:
  PY_COLORS: 1
  UV_LOCKED: 1
  UV_NO_DEV: 1

permissions:
  contents: read

jobs:
  typing:
    if: github.head_ref != 'bump-version'
    strategy:
      matrix:
        python-version: ["3.12"]
        os: [ubuntu-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          activate-environment: true
          enable-cache: "true"
          cache-suffix: typing-${{ matrix.python-version }}
          cache-dependency-glob: "pyproject.toml"
      - name: Create venv
        run: uv venv .venv --clear
      - name: install-reqs
        # TODO: add more dependencies/backends incrementally
        run: uv pip install -e ".[pyspark]" --group typing
      - name: show-deps
        run: uv pip freeze
      - name: Run mypy and pyright
        run: make typing
      - name: Check type-completeness
        run: |
          uv run pyrefly coverage check src/narwhals --public-only
