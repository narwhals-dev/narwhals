name: Check Docs Build

on:
  pull_request:
  workflow_call:

permissions:
  contents: read

env:
  PY_COLORS: 1

jobs:
  zensical-strict-build:
    if: github.head_ref != 'bump-version'
    strategy:
      matrix:
        python-version: ["3.12"]
        os: [ubuntu-latest]

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          python-version: ${{ matrix.python-version }}
          enable-cache: "true"
          cache-suffix: ${{ matrix.python-version }}
          cache-dependency-glob: "pyproject.toml"
      - run: echo "cache_id=$(date --utc '+%V')" >> $GITHUB_ENV
      - name: Check strict build
        run: |
          uv run --group docs --extra pandas --extra dask --extra ibis utils/generate_backend_completeness.py
          uv run --group docs --extra pandas utils/generate_zen_content.py
          uv run --group docs --extra pandas zensical build --strict
