name: PyTest

on:
  pull_request:

env:
  PY_COLORS: 1
  PYTEST_ADDOPTS: "--numprocesses=logical"
  COVERAGE_PROCESS_START: pyproject.toml
  UV_SYSTEM_PYTHON: 1
jobs:
  pytest-39:
    strategy:
      matrix:
        python-version: ["3.9"]
        os: [windows-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: "true"
          cache-suffix: pytest-39-${{ matrix.python-version }}
          cache-dependency-glob: "pyproject.toml"
      - name: install-reqs
        run: uv pip install -e ".[pandas,polars,pyarrow]" --group tests
      - name: show-deps
        run: uv pip freeze
      - name: Run pytest
        env:
          # coverage's execv/fork patches raise on Windows; collapse to `subprocess`
          # there (coverage dedupes) and keep the default values on Linux.
          COVERAGE_PATCH_EXECV: ${{ matrix.os == 'windows-latest' && 'subprocess' || 'execv' }}
          COVERAGE_PATCH_FORK: ${{ matrix.os == 'windows-latest' && 'subprocess' || 'fork' }}
        run: |
          coverage run -m pytest tests --nw-backends=pandas,pyarrow,polars[eager],polars[lazy]
          coverage combine
          coverage report --fail-under=75
      - name: install-test-plugin
        run: uv pip install -e test-plugin/.

  pytest-windows:
    strategy:
      matrix:
        python-version: ["3.10", "3.12"]
        os: [windows-latest]
    runs-on: ${{ matrix.os }}
    env:
      # coverage's execv/fork patches raise on Windows; collapse them to `subprocess`
      # in the pyproject `patch` list (coverage dedupes).
      COVERAGE_PATCH_EXECV: subprocess
      COVERAGE_PATCH_FORK: subprocess
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: "true"
          cache-suffix: pytest-windows-${{ matrix.python-version }}
          cache-dependency-glob: "pyproject.toml"
      - name: install-reqs
        # we are not testing pyspark, modin, or dask on Windows here because nobody got time for that
        run: uv pip install -e "." --group core-tests --group extra
      - name: install-test-plugin
        run: uv pip install -e test-plugin/.
      - name: show-deps
        run: uv pip freeze
      - name: Run pytest
        run: |
          coverage run -m pytest tests --runslow --nw-backends=pandas,pandas[nullable],pandas[pyarrow],pyarrow,polars[eager],polars[lazy],duckdb,sqlframe --durations=30
          coverage combine
          coverage report --fail-under=95

  pytest-full-coverage:
    strategy:
      matrix:
        python-version: ["3.11", "3.13"]
        os: [ubuntu-latest]
        include:
          - python-version: "3.11"
            polars_streaming: true
    runs-on: ${{ matrix.os }}
    env:
      NARWHALS_POLARS_NEW_STREAMING: ${{ matrix.polars_streaming == true }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: "true"
          cache-suffix: pytest-full-coverage-${{ matrix.python-version }}
          cache-dependency-glob: "pyproject.toml"
      - name: install-reqs
        run: uv pip install -e ".[dask]" --group core-tests --group extra
      - name: install-test-plugin
        run: uv pip install -e test-plugin/.
      - name: show-deps
        run: uv pip freeze
      - name: Run pytest
        run: |
          coverage run -m pytest tests --runslow --nw-backends=pandas,pandas[nullable],pandas[pyarrow],pyarrow,polars[eager],polars[lazy],dask,duckdb,sqlframe --durations=30
          coverage combine
          coverage report --fail-under=100
      - name: Run doctests
        # reprs differ between versions, so we only run doctests on the latest Python
        if: matrix.python-version == '3.13'
        run: pytest narwhals --doctest-modules

  # Test against smaller dependency set, used e.g. on Gentoo.
  pytest-narrower-dependencies:
    strategy:
      matrix:
        python-version: ["3.13"]
        os: [ubuntu-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: "true"
          cache-suffix: pytest-narrower-deps-${{ matrix.python-version }}
          cache-dependency-glob: "pyproject.toml"
      - name: install-reqs
        run: |
          uv pip install -e ".[pandas]" --group tests
          uv pip freeze
      - name: Run pytest (pandas and pandas[nullable])
        run: pytest tests --runslow --nw-backends=pandas,pandas[nullable]
      - name: install-more-reqs
        run: |
          uv pip install -U pyarrow
          uv pip freeze
      - name: Run pytest (pandas[pyarrow] and pyarrow)
        run: pytest tests --runslow --nw-backends=pandas[pyarrow],pyarrow
      - name: install-polars
        run: |
          uv pip uninstall pandas pyarrow
          uv pip install polars
          uv pip freeze
      - name: Run pytest (polars)
        run: pytest tests --runslow --nw-backends=polars[eager],polars[lazy]

  python-314:
    strategy:
      matrix:
        python-version: ["3.14"]
        os: [ubuntu-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: "true"
          cache-suffix: python-314-${{ matrix.python-version }}
          cache-dependency-glob: "pyproject.toml"
      - name: install-reqs
        run: uv pip install -e . --group tests pandas polars pyarrow duckdb sqlframe
      - name: show-deps
        run: uv pip freeze
      - name: Run pytest
        run: |
          coverage run -m pytest tests --runslow --nw-backends=pandas,pandas[nullable],pandas[pyarrow],pyarrow,polars[eager],polars[lazy],dask,duckdb,sqlframe --durations=30
          coverage combine
          coverage report --fail-under=50

  python-314t:
    strategy:
      matrix:
        python-version: ["3.14t"]
        os: [ubuntu-latest]
    runs-on: ${{ matrix.os }}
    env:
        PYTHON_GIL: 0
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: "true"
          cache-suffix: python-314t-${{ matrix.python-version }}
          cache-dependency-glob: "pyproject.toml"
      - name: install-reqs
        run: uv pip install -e . --group tests --pre pandas pyarrow
      - name: show-deps
        run: uv pip freeze
      - name: Run pytest
        run: |
          coverage run -m pytest tests --runslow --durations=30 --nw-backends=pandas,pandas[nullable],pandas[pyarrow],pyarrow
          coverage combine
          coverage report --fail-under=50
