name: PyTest

on:
  pull_request:
  workflow_call:

env:
  PY_COLORS: 1
  PYTEST_ADDOPTS: "--numprocesses=logical"
  UV_LOCKED: 1
  UV_NO_DEV: 1

permissions:
  contents: read

jobs:
  pytest-310:
    if: github.head_ref != 'bump-version'
    strategy:
      matrix:
        python-version: ["3.10"]
        os: [windows-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          python-version: ${{ matrix.python-version }}
          enable-cache: "true"
          cache-suffix: pytest-310-${{ matrix.python-version }}
          cache-dependency-glob: "pyproject.toml"
      - name: Run pytest
        shell: bash
        run: make run-ci DEPS="--group tests --extra pandas --extra polars --extra pyarrow" CMD="pytest tests --cov=src --cov=tests --cov-fail-under=75 --constructors=pandas,pyarrow,polars[eager],polars[lazy]"

  pytest-windows:
    if: github.head_ref != 'bump-version'
    strategy:
      matrix:
        python-version: ["3.10", "3.13"]
        os: [windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          python-version: ${{ matrix.python-version }}
          enable-cache: "true"
          cache-suffix: pytest-windows-${{ matrix.python-version }}
          cache-dependency-glob: "pyproject.toml"
      # we are not testing pyspark, modin, or dask on Windows here because nobody got time for that
      - name: Run pytest
        shell: bash
        run: make run-ci DEPS="--group core-tests --group extra --extra pandas" CMD="pytest tests --cov=src --cov=tests --runslow --cov-fail-under=95 --durations=30 --constructors=pandas,pandas[nullable],pandas[pyarrow],pyarrow,polars[eager],polars[lazy],duckdb,sqlframe"

  pytest-full-coverage:
    if: github.head_ref != 'bump-version'
    strategy:
      matrix:
        python-version: ["3.11", "3.13"]
        os: [ubuntu-latest]
        include:
          - python-version: "3.11"
            polars_streaming: true
    runs-on: ${{ matrix.os }}
    env:
      NARWHALS_POLARS_NEW_STREAMING: ${{ matrix.polars_streaming == true }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          python-version: ${{ matrix.python-version }}
          enable-cache: "true"
          cache-suffix: pytest-full-coverage-${{ matrix.python-version }}
          cache-dependency-glob: "pyproject.toml"
      - name: Run pytest (plan)
        run: make run-ci-plan
      - name: Run pytest
        run: make run-ci DEPS="--extra pandas --extra dask --group core-tests --group extra" CMD="pytest tests --cov=src --cov=tests --cov-fail-under=100 --runslow --durations=30 --constructors=pandas,pandas[nullable],pandas[pyarrow],pyarrow,polars[eager],polars[lazy],dask,duckdb,sqlframe --ignore=tests/plan --ignore=src/narwhals/_plan --cov-append"
      - name: Run doctests
        # reprs differ between versions, so we only run doctests on the latest Python
        if: matrix.python-version == '3.13'
        run: make run-ci DEPS="--extra pandas --extra dask --group core-tests --group extra" CMD="pytest src --doctest-modules --ignore=src/narwhals/_plan" 

  # Test against smaller dependency set, used e.g. on Gentoo.
  pytest-narrower-dependencies:
    if: github.head_ref != 'bump-version'
    strategy:
      matrix:
        python-version: ["3.13"]
        os: [ubuntu-latest]
    runs-on: ${{ matrix.os }}
    env:
      UV_LOCKED: 0
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          python-version: ${{ matrix.python-version }}
          enable-cache: "true"
          cache-suffix: pytest-narrower-deps-${{ matrix.python-version }}
          cache-dependency-glob: "pyproject.toml"
      - name: Run pytest (pandas and pandas[nullable])
        run: make run-ci DEPS="-U --group tests --extra pandas" RUN_ONLY="--isolated" CMD="pytest tests --runslow --constructors=pandas,pandas[nullable]"
      - name: Run pytest (pandas[pyarrow] and pyarrow)
        run: make run-ci DEPS="-U --group tests --extra pandas --extra pyarrow" RUN_ONLY="--isolated" CMD="pytest tests --runslow --constructors=pandas[pyarrow],pyarrow"
      - name: Run pytest (polars)
        run: make run-ci DEPS="-U --group tests --extra polars" RUN_ONLY="--isolated" CMD="pytest tests --runslow --constructors=polars[eager],polars[lazy]"

  python-314:
    if: github.head_ref != 'bump-version'
    strategy:
      matrix:
        python-version: ["3.14"]
        os: [ubuntu-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          python-version: ${{ matrix.python-version }}
          enable-cache: "true"
          cache-suffix: python-314-${{ matrix.python-version }}
          cache-dependency-glob: "pyproject.toml"
      - name: Run pytest
        run: make run-ci DEPS="--group core-tests --extra pandas" CMD="pytest tests --cov=src --cov=tests --cov-fail-under=50 --runslow --durations=30 --constructors=pandas,pandas[nullable],pandas[pyarrow],pyarrow,polars[eager],polars[lazy],duckdb,sqlframe"

  python-314t:
    if: github.head_ref != 'bump-version'
    strategy:
      matrix:
        python-version: ["3.14t"]
        os: [ubuntu-latest]
    runs-on: ${{ matrix.os }}
    env:
        PYTHON_GIL: 0
        UV_LOCKED: 0
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          python-version: ${{ matrix.python-version }}
          enable-cache: "true"
          cache-suffix: python-314t-${{ matrix.python-version }}
          cache-dependency-glob: "pyproject.toml"
      - name: Run pytest
        run: make run-ci DEPS="--pre --group tests --extra pandas --extra pyarrow" CMD="pytest tests --cov=src --cov=tests --cov-fail-under=50 --runslow --durations=30 --constructors=pandas,pandas[nullable],pandas[pyarrow],pyarrow"
