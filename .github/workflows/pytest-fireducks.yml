name: PyTest FireDucks

on:
  pull_request:
  workflow_call:

env:
  PY_COLORS: 1
  UV_LOCKED: 0
  UV_NO_DEV: 1

permissions:
  contents: read

jobs:
  pytest-fireducks:
    if: github.head_ref != 'bump-version'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          python-version: "3.13"
          enable-cache: "true"
          cache-suffix: fireducks-3.13
          cache-dependency-glob: "pyproject.toml"
      - name: Run pytest
        run: make run-ci DEPS="-U --group tests --extra pandas" RUN_ONLY="--with fireducks" CMD="python -m fireducks.pandas --hook-import-module -m pytest tests/fireducks_test.py"
