name: Tests for TPCH Queries

on:
  pull_request:

env:
  PY_COLORS: 1

permissions:
  contents: read

jobs:
  validate-queries:
    strategy:
      matrix:
        python-version: ["3.12"]
        os: [ubuntu-latest]

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          python-version: ${{ matrix.python-version }}
          enable-cache: "true"
          cache-suffix: ${{ matrix.python-version }}
          cache-dependency-glob: "pyproject.toml"
      - name: Show dependencies
        run: uv pip compile pyproject.toml --extra dask --extra pandas --group core-tests
      - name: generate-data
        run: uv run --extra dask --extra pandas --group core-tests --module tpch.generate_data --debug
      - name: tpch-tests 
        run: uv run --extra dask --extra pandas --group core-tests pytest tpch/tests
