name: Min, old, and nightly versions

on:
  pull_request:

env:
  PY_COLORS: 1
  PYTEST_ADDOPTS: "--numprocesses=logical"

permissions:
  contents: read

jobs:
  minimum_versions:
    strategy:
      matrix:
        python-version: ["3.10"]
        os: [ubuntu-latest]

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          python-version: ${{ matrix.python-version }}
          enable-cache: "true"
          cache-suffix: min-versions-${{ matrix.python-version }}
          cache-dependency-glob: "pyproject.toml"
      - name: Run pytest
        run: |
          uv run \
          --with setuptools --with tzdata \
          --with "pandas==1.3.4" \
          --with "polars==0.20.4" \
          --with "numpy==1.21.4" \
          --with "pyarrow==13.0.0" \
          --with "pyarrow-stubs<17" \
          --with "scipy==1.7.3" \
          --with "scikit-learn==1.1.0" \
          --with "duckdb==1.1" \
          --group tests \
          pytest tests --cov=src --cov=tests --cov-fail-under=50 --runslow \
          --constructors="pandas,pyarrow,polars[eager],polars[lazy],duckdb"

  pretty_old_versions:
    strategy:
      matrix:
        python-version: ["3.10"]
        os: [ubuntu-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2    
      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          python-version: ${{ matrix.python-version }}
          enable-cache: "true"
          cache-suffix: pretty-old-versions-${{ matrix.python-version }}
          cache-dependency-glob: "pyproject.toml"
      - name: Run pytest
        run: |
          uv run \
          --with setuptools --with tzdata \
          --with "pandas==1.4.1" \
          --with "polars==0.20.4" \
          --with "numpy==1.22.0" \
          --with "pyarrow==14.0.0" \
          --with "pyarrow-stubs<17" \
          --with "scipy==1.8.0" \
          --with "scikit-learn==1.1.0" \
          --with "duckdb==1.2" \
          --group tests \
          pytest tests --cov=src --cov=tests --cov-fail-under=50 --runslow \
          --constructors="pandas,pyarrow,polars[eager],polars[lazy],duckdb"

  not_so_old_versions:
    strategy:
      matrix:
        python-version: ["3.10"]
        os: [ubuntu-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          python-version: ${{ matrix.python-version }}
          enable-cache: "true"
          cache-suffix: not-so-old-versions-${{ matrix.python-version }}
          cache-dependency-glob: "pyproject.toml"
      - name: Run pytest
        run: |
          uv run \
          --with setuptools --with tzdata \
          --with "pandas==2.0.3" \
          --with "polars==0.20.8" \
          --with "numpy==1.24.4" \
          --with "pyarrow==15.0.0" \
          --with "pyarrow-stubs<17" \
          --with "scipy==1.8.0" \
          --with "scikit-learn==1.3.0" \
          --with "duckdb==1.3" \
          --with "dask[dataframe]==2024.10" \
          --group tests \
          pytest tests --cov=src --cov=tests --cov-fail-under=50 --runslow \
          --constructors="pandas,pyarrow,polars[eager],polars[lazy],dask,duckdb"

  nightlies:
    env:
      UV_SYSTEM_PYTHON: 1
    strategy:
      matrix:
        python-version: ["3.12"]
        os: [ubuntu-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          python-version: ${{ matrix.python-version }}
          enable-cache: "true"
          cache-suffix: nightlies-${{ matrix.python-version }}
          cache-dependency-glob: "pyproject.toml"
      - name: install-reqs
        run: uv pip install -e . --group tests
      - name: install polars pre-release
        run: |
          uv pip uninstall polars
          uv pip install -U --pre polars
      - name: install-pandas-nightly
        run: |
          uv pip uninstall pandas
          uv pip install pandas --pre --index https://pypi.anaconda.org/scientific-python-nightly-wheels/simple -U
      - name: install pyarrow nightly
        run: |
          uv pip uninstall pyarrow
          uv pip install pyarrow --pre --index https://pypi.fury.io/arrow-nightlies/ -U
      - name: install numpy nightly
        run: |
          uv pip uninstall numpy
          uv pip install numpy --pre --index https://pypi.anaconda.org/scientific-python-nightly-wheels/simple -U
      - name: install dask
        run: |
          uv pip uninstall dask dask-expr
          uv pip install "git+https://github.com/dask/dask[dataframe]"
      - name: install duckdb nightly
        run: |
          uv pip uninstall duckdb
          uv pip install -U --pre duckdb
      - name: show-deps
        run: uv pip freeze
      - name: Assert nightlies dependencies
        run: |
          DEPS=$(uv pip freeze)
          echo "$DEPS" | grep -E 'pandas.*(dev|rc|\+)'
          echo "$DEPS" | grep 'pyarrow.*dev'
          echo "$DEPS" | grep 'numpy.*dev'
          echo "$DEPS" | grep 'dask.*@'
      - name: Run pytest
        run: |
          pytest tests --cov=src --cov=tests --cov-fail-under=50 --runslow \
          --constructors="pandas,pandas[nullable],pandas[pyarrow],pyarrow,polars[eager],polars[lazy],dask,duckdb"
