# This is taken from
# https://packaging.python.org/en/latest/guides/publishing-package-distribution-releases-using-github-actions-ci-cd-workflows/#the-whole-ci-cd-workflow
# but with the following differences
# - removed the TestPyPI part
# - instead of `on: push`, we have `tags` in there too
#
# To gate the release on a new workflow:
#   1. In the gating workflow, add `workflow_call:` to its `on:` triggers.
#   2. Add `if: github.head_ref != 'bump-version'` to every job in that workflow.
#      This skips it on the release PR opened from `bump-version`
#      (otherwise jobs would run twice: once on the PR, once via the workflow_call below).
#   3. Below, add a job that `uses: ./.github/workflows/<file>.yml` and append its name to `build.needs:`.

name: Publish Python 🐍 distribution 📦 to PyPI

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+*"

permissions: {}

jobs:
  pytest:
    name: PyTest
    uses: ./.github/workflows/pytest.yml
    permissions:
      contents: read

  pytest-pyspark:
    name: PyTest PySpark
    uses: ./.github/workflows/pytest-pyspark.yml
    permissions:
      contents: read

  pytest-ibis:
    name: PyTest Ibis
    uses: ./.github/workflows/pytest-ibis.yml
    permissions:
      contents: read

  pytest-modin:
    name: PyTest Modin
    uses: ./.github/workflows/pytest-modin.yml
    permissions:
      contents: read

  typing:
    name: Type checking
    uses: ./.github/workflows/typing.yml
    permissions:
      contents: read

  downstream-tests:
    name: Downstream tests
    uses: ./.github/workflows/downstream_tests.yml
    permissions:
      contents: read

  downstream-tests-slow:
    name: Downstream tests (slow)
    uses: ./.github/workflows/downstream_tests_slow.yml
    permissions:
      contents: read

  check-docs-build:
    name: Check docs build
    uses: ./.github/workflows/check_docs_build.yml
    permissions:
      contents: read

  build:
    name: Build distribution 📦
    needs:
      - pytest
      - pytest-pyspark
      - pytest-ibis
      - pytest-modin
      - typing
      - downstream-tests
      - downstream-tests-slow
      - check-docs-build
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        persist-credentials: false
    - name: Set up Python
      uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
      with:
        python-version: "3.x"
    - name: Install uv
      uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
    - name: Build a binary wheel and a source tarball
      run: uv build
    - name: Check wheel content
      run: uv run --no-project --no-sync python utils/check_dist_content.py
    - name: Store the distribution packages
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
      with:
        name: python-package-distributions
        path: dist/

  publish-to-pypi:
    name: >-
      Publish Python 🐍 distribution 📦 to PyPI
    if: startsWith(github.ref, 'refs/tags/')  # only publish to PyPI on tag pushes
    needs:
    - build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/narwhals
    permissions:
      id-token: write  # IMPORTANT: mandatory for trusted publishing

    steps:
    - name: Download all the dists
      uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
      with:
        name: python-package-distributions
        path: dist/
    - name: Publish distribution 📦 to PyPI
      uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # v1.14.0

  github-release:
    name: >-
      Sign the Python 🐍 distribution 📦 with Sigstore
      and upload them to GitHub Release
    needs:
    - publish-to-pypi
    runs-on: ubuntu-latest
    permissions:
      contents: write  # IMPORTANT: mandatory for making GitHub Releases
      id-token: write  # IMPORTANT: mandatory for sigstore
    steps:
    - name: Download all the dists
      uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
      with:
        name: python-package-distributions
        path: dist/
    - name: Sign the dists with Sigstore
      uses: sigstore/gh-action-sigstore-python@04cffa1d795717b140764e8b640de88853c92acc # v3.3.0
      with:
        inputs: >-
          ./dist/*.tar.gz
          ./dist/*.whl
    - name: Create GitHub Release
      env:
        GITHUB_TOKEN: ${{ github.token }}
      run: >-
        gh release create
        "$GITHUB_REF_NAME"
        --repo "$GITHUB_REPOSITORY"
        --notes ""
    - name: Upload artifact signatures to GitHub Release
      env:
        GITHUB_TOKEN: ${{ github.token }}
      # Upload to GitHub Release using the `gh` CLI.
      # `dist/` contains the built packages, and the
      # sigstore-produced signatures and certificates.
      run: >-
        gh release upload
        "$GITHUB_REF_NAME" dist/**
        --repo "$GITHUB_REPOSITORY"
