name: PyTest PySpark constructor

on:
  pull_request:
    paths:
      - .github/workflows/pytest-pyspark.yml
      - src/narwhals/_expression_parsing.py
      - src/narwhals/_spark_like/**
      - src/narwhals/_sql/**
      - tests/*scan*.py
      - tests/frame/*sink*.py
  workflow_call:
  schedule:
    - cron: 0 12 * * 0  # Sunday at mid-day

env:
  PY_COLORS: 1
  PYTEST_ADDOPTS: "--numprocesses=logical"
  UV_LOCKED: 1
  UV_NO_DEV: 1

permissions:
  contents: read

jobs:
  pytest-pyspark-constructor:
    if: github.head_ref != 'bump-version'
    strategy:
      matrix:
        python-version: ["3.11"]
        os: [ubuntu-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          python-version: ${{ matrix.python-version }}
          enable-cache: "true"
          cache-suffix: pyspark-${{ matrix.python-version }}
          cache-dependency-glob: "pyproject.toml"
      - name: Run pytest
        run: make run-ci DEPS="--group core-tests --extra pyspark --extra pandas" CMD="pytest tests --cov=src/narwhals/_spark_like --cov-fail-under=95 --runslow --constructors=pyspark"

  pytest-pyspark-min-version-constructor:
    if: github.head_ref != 'bump-version'
    strategy:
      matrix:
        python-version: ["3.11"]
        os: [ubuntu-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          python-version: ${{ matrix.python-version }}
          enable-cache: "true"
          cache-suffix: pyspark-min-${{ matrix.python-version }}
          cache-dependency-glob: "pyproject.toml"
      - name: Run pytest
        run: make run-ci DEPS="--group min-pyspark-version --extra pandas" CMD="pytest tests --cov=src/narwhals/_spark_like --cov-fail-under=95 --runslow --constructors=pyspark"

  pytest-pyspark-connect-constructor:
    if: github.head_ref != 'bump-version'
    strategy:
      matrix:
        python-version: ["3.11"]
        os: [ubuntu-latest]
    env:
      SPARK_VERSION: 4.1.0
      SPARK_PORT: 15002
      SPARK_CONNECT: true
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          python-version: ${{ matrix.python-version }}
          enable-cache: "true"
          cache-suffix: pyspark-connect-${{ matrix.python-version }}
          cache-dependency-glob: "pyproject.toml"

      - name: Install Java 17
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          distribution: zulu
          java-version: 17

      - name: Create venv
        run: uv venv --python ${{ matrix.python-version }}

      - name: install-reqs
        # temporary pin to get CI green
        run: uv pip install -e ".[pandas]" --group core-tests --group sklearn "pyarrow<22.0"
      - name: install pyspark
        run: uv pip install -e . "pyspark[connect]==${SPARK_VERSION}" "setuptools<78"
      - name: show-deps
        run: uv pip freeze

      - name: Set Spark env variables
        run: echo "SPARK_HOME=$(uv run --no-sync python -c 'import pyspark, os; print(os.path.dirname(pyspark.__file__))')" >> $GITHUB_ENV

      - name: Fetch connect server scripts
        # pyspark[connect] ships everything these scripts need, just not the scripts themselves
        run: |
          curl -sSf "https://raw.githubusercontent.com/apache/spark/v${SPARK_VERSION}/sbin/start-connect-server.sh" -o "$SPARK_HOME/sbin/start-connect-server.sh"
          curl -sSf "https://raw.githubusercontent.com/apache/spark/v${SPARK_VERSION}/sbin/stop-connect-server.sh" -o "$SPARK_HOME/sbin/stop-connect-server.sh"
          chmod +x "$SPARK_HOME/sbin/start-connect-server.sh" "$SPARK_HOME/sbin/stop-connect-server.sh"

      - name: Start Spark Connect server
        run: |
          $SPARK_HOME/sbin/start-connect-server.sh \
            --conf spark.connect.grpc.binding.port=${SPARK_PORT}
          sleep 5
          echo "Spark Connect server started"

      - name: Run pytest
        run: uv run --no-sync pytest tests --cov=src/narwhals/_spark_like --cov-fail-under=95 --runslow --constructors "pyspark[connect]"

      - name: Stop Spark Connect server
        if: always()
        run: $SPARK_HOME/sbin/stop-connect-server.sh
