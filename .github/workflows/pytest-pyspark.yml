name: PyTest PySpark constructor

on:
  pull_request:
    paths:
      - src/narwhals/_expression_parsing.py
      - src/narwhals/_spark_like/**
      - src/narwhals/_sql/**
      - tests/*scan*.py
      - tests/frame/*sink*.py
  workflow_call:
  schedule:
    - cron: 0 12 * * 0  # Sunday at mid-day

env:
  PY_COLORS: 1
  PYTEST_ADDOPTS: "--numprocesses=logical"

permissions:
  contents: read

jobs:
  pytest-pyspark-constructor:
    if: github.head_ref != 'bump-version'
    strategy:
      matrix:
        python-version: ["3.11"]
        os: [ubuntu-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          python-version: ${{ matrix.python-version }}
          enable-cache: "true"
          cache-suffix: pyspark-${{ matrix.python-version }}
          cache-dependency-glob: "pyproject.toml"
      - name: Show dependencies
        run: uv pip compile pyproject.toml --group pyspark-tests
      - name: Run pytest
        run: |
          uv run --group pyspark-tests \
          pytest tests --cov=src/narwhals/_spark_like --cov-fail-under=95 --runslow \
          --constructors="pyspark"

  pytest-pyspark-min-version-constructor:
    if: github.head_ref != 'bump-version'
    strategy:
      matrix:
        python-version: ["3.11"]
        os: [ubuntu-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          python-version: ${{ matrix.python-version }}
          enable-cache: "true"
          cache-suffix: pyspark-min-${{ matrix.python-version }}
          cache-dependency-glob: "pyproject.toml"
      - name: Show dependencies
        run: uv pip compile pyproject.toml --group pyspark-tests
      - name: Run pytest
        run: uv run --group pyspark-tests --with "pyspark==3.5.0" \
          pytest tests --cov=src/narwhals/_spark_like --cov-fail-under=95 --runslow \
          --constructors="pyspark"

  pytest-pyspark-connect-constructor:
    if: github.head_ref != 'bump-version'
    strategy:
      matrix:
        python-version: ["3.11"]
        os: [ubuntu-latest]
    env:
      SPARK_VERSION: 4.1.0
      SPARK_PORT: 15002
      SPARK_CONNECT: true
      SPARK_HOME: ""
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          python-version: ${{ matrix.python-version }}
          enable-cache: "true"
          cache-suffix: pyspark-connect-${{ matrix.python-version }}
          cache-dependency-glob: "pyproject.toml"

      - name: Install Java 17
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          distribution: zulu
          java-version: 17

      - name: Create venv
        run: uv venv --python ${{ matrix.python-version }}

      - name: install-reqs
        # temporary pin to get CI green
        run: uv pip install -e ".[pandas]" --group core-tests --group extra "pyarrow<22.0"
      - name: install pyspark
        run: uv pip install -e . "pyspark[connect]==${SPARK_VERSION}" "setuptools<78"
      - name: show-deps
        run: uv pip freeze

      - name: Cache Spark
        id: cache-spark
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: /opt/spark
          key: spark-${{ env.SPARK_VERSION }}-bin-hadoop3

      - name: Download Spark
        if: steps.cache-spark.outputs.cache-hit != 'true'
        run: |
          wget https://archive.apache.org/dist/spark/spark-${SPARK_VERSION}/spark-${SPARK_VERSION}-bin-hadoop3.tgz
          tar -xzf spark-${SPARK_VERSION}-bin-hadoop3.tgz
          sudo mv spark-${SPARK_VERSION}-bin-hadoop3 /opt/spark

      - name: Set Spark env variables
        run: |
          echo "SPARK_HOME=/opt/spark" >> $GITHUB_ENV
          echo "/opt/spark/bin" >> $GITHUB_PATH

      - name: Start Spark Connect server
        run: |
          $SPARK_HOME/sbin/start-connect-server.sh \
            --conf spark.connect.grpc.binding.port=${SPARK_PORT}
          sleep 5
          echo "Spark Connect server started"

      - name: Run pytest
        run: uv run --no-sync pytest tests --cov=src/narwhals/_spark_like --cov-fail-under=95 --runslow --constructors "pyspark[connect]"

      - name: Stop Spark Connect server
        if: always() && env.SPARK_HOME != ''
        run: $SPARK_HOME/sbin/stop-connect-server.sh
